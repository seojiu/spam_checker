<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>스팸 판별기(Spam Checker!!!)</title>
</head>

<body>
    <h1>스팸 판별기</h1>
    <textarea id="text" rows="5" cols="60" placeholder="지금 무료 상품 받기"></textarea><br><br>
    <button onclick="classify()">스팸 탐지 버튼 입니다.</button>
    <h3 id="result"></h3>
    <script>
        function classify() {
            const text = document.getElementById("text").value;

            //issue 2번, 빈 텍스트로 분류하려고 할 때 생기는 문제 해결
            const result = document.getElementById("result")
            if(!text){
                result.innerText = "메세지를 입력해주세요"
                return;
            }

            fetch("/classify", {
                method: "POST",
                body: JSON.stringify({ text })
            })
                .then(res => res.json())
                .then(data => {
                    document.getElementById("result").innerText =
                        "결과: " + data.label + " (score=" + data.score + ")";
                })
                .catch(() => {
                    document.getElementById("result").innerText = "에러 발생!";
                });
        }
    </script>
</body>

</html>
